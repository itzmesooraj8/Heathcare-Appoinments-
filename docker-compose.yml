version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@mysql:3307/healthcare_db
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: healthcare_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  jitsi:
    image: jitsi/jitsi-meet
    restart: always
    ports:
      - "8001:80"
      - "8443:443"
      - "10000:10000/udp"
    environment:
      - JITSI_APP_ID=your_jitsi_app_id
      - JITSI_SECRET=your_jitsi_secret
      - JITSI_DOMAIN=meet.jit.si

volumes:
  mysql_data:
